<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noix - Portoilo</title>
    <!-- Link to your CSS stylesheet here -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
          
</head>
<body class="dark">
    <div class="greeting">
        <div class="labels">
            <span class="name">Hi! I'm Novix</span>
            <span class="skill">
                I'm 
                <span class="js-text"></span>
                <span class="indicator"></span>
            </span>
        </div>
        <div class="my-skills">
            <span class="title">My Skills</span>
            <div class="skill-icons">
                <i class="devicon-java-plain"></i>
                <i class="devicon-javascript-plain"></i>
                <i class="devicon-css3-plain"></i>
                <i class="devicon-html5-plain"></i>
            </div>
        </div>
    </div>
    <div class="projects">
        <span class="label">My Projects</span>
        <div class="project-cards">
            <div class="card" id="RoFlow">
                <div class="title">RoFlow
                    <div class="skills">
                        <i class="devicon-javascript-plain"></i>
                        <i class="devicon-css3-plain"></i>
                    </div>
                </div>

                <span class="disc">
                    RoFlow is a Roblox extension designed to enhance your experience by improving the website and adding Quality-of-Life (QoL) changes while being fully local.
                </span>

                <div class="bottom">
                    Unreleased
                </div>
            </div>
            <div class="card" id="LibertyJS">
                <div class="title">LibertyJS
                    <div class="skills">
                        <i class="devicon-javascript-plain"></i>
                    </div>
                </div>
                <span class="disc">
                    A JavaScript SDK for the ER:LC Private Server API.
                </span>

                <div class="bottom">
                    <span class="github">
                        <i class="devicon-github-original"></i>
                        Github
                    </span>
                    <span class="npm">
                        <i class="devicon-npm-plain"></i>
                        npm
                    </span>
                    <span class="website">
                        <span class="material-symbols-outlined">web</span>
                        Website
                    </span>
                </div>
            </div>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
